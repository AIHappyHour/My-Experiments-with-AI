<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Experiments</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Emoji row ── */
    .emoji-row {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .emoji-btn {
      font-size: 3rem;
      cursor: pointer;
      user-select: none;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
      line-height: 1;
      background: none;
      border: none;
      padding: 12px;
      border-radius: 16px;
    }

    .emoji-btn:hover {
      transform: scale(1.2) translateY(-4px);
      background: #f5f5f5;
    }

    .emoji-btn.active {
      transform: scale(1.15) translateY(-6px);
    }

    /* ── Popup overlay ── */
    .popup-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .popup-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .popup-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.08);
      backdrop-filter: blur(2px);
    }

    /* ── Popup card ── */
    .popup-card {
      position: relative;
      z-index: 1;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 20px;
      padding: 36px 40px 32px;
      max-width: 480px;
      width: 92vw;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
      transform: translateY(16px) scale(0.96);
      transition: transform 0.28s cubic-bezier(.34,1.4,.64,1);
      scrollbar-width: thin;
      scrollbar-color: #ddd #fff;
    }

    .popup-card::-webkit-scrollbar { width: 5px; }
    .popup-card::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

    .popup-overlay.visible .popup-card {
      transform: translateY(0) scale(1);
    }

    .popup-close {
      position: sticky;
      top: 0;
      float: right;
      margin-left: 8px;
      background: #f0f0f0;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      transition: background 0.15s, color 0.15s;
      z-index: 2;
    }

    .popup-close:hover { background: #e0e0e0; color: #111; }

    /* ── Popup content ── */
    .popup-emoji {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 6px;
    }

    .popup-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: #111;
      margin-bottom: 3px;
    }

    .popup-subtitle {
      font-size: 0.85rem;
      color: #888;
      font-style: italic;
      margin-bottom: 16px;
    }

    .popup-body { font-size: 0.9rem; line-height: 1.75; color: #444; }
    .popup-body p { margin-bottom: 12px; }

    .popup-body .section-label {
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
      margin-top: 16px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
    }

    .popup-body ul {
      list-style: none;
      padding: 0;
      margin-bottom: 12px;
    }

    .popup-body ul li {
      padding: 3px 0;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }

    .popup-body .eco-note {
      font-size: 0.78rem;
      color: #aaa;
      font-style: italic;
      margin-top: 8px;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 16px 0;
    }
  </style>
</head>
<body>

  <!-- Emoji Row -->
  <div class="emoji-row" role="list">
    <button class="emoji-btn" data-id="0" aria-label="Broetry Bot" role="listitem">🤖</button>
    <button class="emoji-btn" data-id="1" aria-label="30 days of Midjourney" role="listitem">🖼️</button>
    <button class="emoji-btn" data-id="2" aria-label="Cover letter lab" role="listitem">📝</button>
    <button class="emoji-btn" data-id="3" aria-label="Omar the tech journalist" role="listitem">👤</button>
    <button class="emoji-btn" data-id="4" aria-label="Meet the Glimmerwhims" role="listitem">📚</button>
  </div>

  <!-- Popup -->
  <div class="popup-overlay" id="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <div class="popup-backdrop" id="popup-backdrop"></div>
    <div class="popup-card" id="popup-card">
      <button class="popup-close" id="popup-close" aria-label="Close">✕</button>
      <span class="popup-emoji" id="popup-emoji"></span>
      <h2 class="popup-title" id="popup-title"></h2>
      <p class="popup-subtitle" id="popup-subtitle"></p>
      <div class="popup-body" id="popup-body"></div>
    </div>
  </div>

  <script>
    const data = [
      {
        emoji: "🤖",
        title: "Broetry Bot",
        subtitle: "A LinkedIn takeover that damaged my writing creds",
        body: `
          <p>I created an AI agent to ideate, create, and share LinkedIn posts for 30 days. I did leave room for human-in-the-loop review but kept my modifications to a minimum.</p>
          <span class="section-label">✅ What worked</span>
          <p>30 posts created and shared. The automation worked for the most part with just a few occasional interventions to correct any technical glitches.</p>
          <span class="section-label">❌ What didn't work</span>
          <p>The content itself was extremely cringe. A mix of LinkedIn broetry, clichés, uninspiring formatting, expected engagement bait. The images were by far the worst part of the experiment. Creating images for abstract concepts requires human-level thinking and complex associations that AI is unable to make.</p>
          <hr class="divider"/>
          <span class="section-label">🛠 Tech stack</span>
          <ul>
            <li><span>🔧</span><span><strong>Agent</strong> — Make.com</span></li>
            <li><span>✍️</span><span><strong>Research + writing</strong> — ChatGPT</span></li>
            <li><span>🎨</span><span><strong>Image generation</strong> — Dall-e</span></li>
            <li><span>☁️</span><span><strong>Cloud</strong> — Google Drive</span></li>
          </ul>
          <hr class="divider"/>
          <span class="section-label">🌿 Eco footprint</span>
          <ul>
            <li><span>💧</span><span>28–80 glasses of drinking water</span></li>
            <li><span>💡</span><span>58–183 hours of powering a 60W bulb</span></li>
            <li><span>📱</span><span>300–900 full phone recharges</span></li>
            <li><span>🌳</span><span>1–3 months for a tree to absorb the CO₂ emitted</span></li>
          </ul>
          <p class="eco-note">* These are just guesstimates, hard to calculate given the opacity around AI tech. Does not include model training cost.</p>
        `
      },
      {
        emoji: "🖼️",
        title: "30 Days of Midjourney",
        subtitle: "A social experiment on AI copyright",
        body: `<p>Coming soon.</p>`
      },
      {
        emoji: "📝",
        title: "Cover Letter Lab",
        subtitle: "A vibe-coded cover letter generator that's useless but fun",
        body: `
          <p>I want AI to work on the boring tasks (filling timesheets?) so I can do what I love – write. To help other advertising folks like me, I created an AI app to write cover letters. An unserious experiment with some serious laughs.</p>
          <span class="section-label">✅ What worked</span>
          <p>Letting AI handle the coding made this a fast, low-effort experiment. I did the writing which reduced the AI eco-footprint and kept the letters actually interesting. Nobody knows the inside humour of an agency like a 20-year veteran 😎</p>
          <span class="section-label">❌ What didn't work</span>
          <p>"Vibe-coded" means trying to fix even one small thing (like changing the colour of a button) would throw everything into chaos. It took a lot of prompting and design compromises to arrive at the final output.</p>
          <hr class="divider"/>
          <span class="section-label">🛠 Tech stack</span>
          <ul>
            <li><span>💻</span><span><strong>Code</strong> — Claude</span></li>
            <li><span>🎨</span><span><strong>Images</strong> — Midjourney</span></li>
            <li><span>🚀</span><span><strong>Build</strong> — Github</span></li>
          </ul>
          <hr class="divider"/>
          <span class="section-label">🌿 Eco footprint</span>
          <ul>
            <li><span>💧</span><span>6–18 glasses of drinking water</span></li>
            <li><span>💡</span><span>12–40 hours of powering a 60W bulb</span></li>
            <li><span>📱</span><span>60–200 full phone recharges</span></li>
            <li><span>🌳</span><span>5–20 days for a tree to absorb the CO₂ emitted</span></li>
          </ul>
          <p class="eco-note">* These are just guesstimates, hard to calculate given the opacity around AI tech. Does not include model training cost.</p>
        `
      },
      {
        emoji: "👤",
        title: "Omar the Tech Journalist",
        subtitle: "An AI influencer talking to people about AI",
        body: `<p>Coming soon.</p>`
      },
      {
        emoji: "📚",
        title: "Meet the Glimmerwhims",
        subtitle: "An AI book to promote critical thinking",
        body: `<p>Coming soon.</p>`
      }
    ];

    const popup      = document.getElementById('popup');
    const popupEmoji = document.getElementById('popup-emoji');
    const popupTitle = document.getElementById('popup-title');
    const popupSub   = document.getElementById('popup-subtitle');
    const popupBody  = document.getElementById('popup-body');
    const popupCard  = document.getElementById('popup-card');
    const closeBtn   = document.getElementById('popup-close');
    const backdrop   = document.getElementById('popup-backdrop');

    let activeBtn = null;

    function openPopup(id) {
      const d = data[id];
      popupEmoji.textContent = d.emoji;
      popupTitle.textContent = d.title;
      popupSub.textContent   = d.subtitle;
      popupBody.innerHTML    = d.body;
      popupCard.scrollTop    = 0;
      popup.classList.add('visible');
    }

    function closePopup() {
      popup.classList.remove('visible');
      if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
    }

    document.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (activeBtn) activeBtn.classList.remove('active');
        activeBtn = btn;
        btn.classList.add('active');
        openPopup(Number(btn.dataset.id));
      });
    });

    closeBtn.addEventListener('click', closePopup);
    backdrop.addEventListener('click', closePopup);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });
  </script>
</body>
</html>
